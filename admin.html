<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Messages</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h1>Messages</h1>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody id="messages"></tbody>
  </table>

  <script>
    async function loadMessages() {
      const res = await fetch("https://free-serverless.ckc-2d8.workers.dev/list");
      const data = await res.json();

      const tbody = document.querySelector("#messages");
      tbody.innerHTML = "";

      data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.id}</td>
          <td>${row.name}</td>
          <td>${row.email}</td>
          <td>${row.message}</td>
          <td>${row.created_at}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadMessages();
  </script>
</body>
</html>
