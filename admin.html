<h1>Contact Messages</h1>
<table id="messages" border="1">
  <thead>
    <tr>
      <th>ID</th><th>Name</th><th>Email</th><th>Message</th><th>Time</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function load() {
  const res = await fetch("https://faas-xxx.functions.digitaloceanspaces.com/api/admin/index");
  const data = await res.json();

  const tbody = document.querySelector("#messages tbody");
  tbody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.id}</td>
      <td>${row.name}</td>
      <td>${row.email}</td>
      <td>${row.message}</td>
      <td>${row.created_at}</td>
    `;
    tbody.appendChild(tr);
  });
}

load();
</script>
