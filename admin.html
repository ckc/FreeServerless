<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Messages</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h1>Messages</h1>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody id="messages"></tbody>
  </table>

<script>
  async function loadMessages() {
    let key = localStorage.getItem("admin_key");

    // 如果 localStorage 沒有密碼 → 要求輸入
    if (!key) {
      key = prompt("Enter admin password:");
      if (!key) return;
      localStorage.setItem("admin_key", key);
    }

    const res = await fetch("https://free-serverless.ckc-2d8.workers.dev/list", {
      headers: {
        "x-admin-key": key
      }
    });

    // 如果密碼錯誤 → 清除 localStorage → 再要求一次
    if (res.status === 401) {
      alert("Wrong password");
      localStorage.removeItem("admin_key");
      return loadMessages(); // 再跑一次
    }

    const data = await res.json();
    const tbody = document.querySelector("#messages");
    tbody.innerHTML = "";

    data.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.id}</td>
        <td>${row.name}</td>
        <td>${row.email}</td>
        <td>${row.message}</td>
        <td>${row.created_at}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  loadMessages();
</script>
</body>
</html>
